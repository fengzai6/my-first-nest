server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # Gzip 压缩：优先使用构建时预压缩的 .gz 文件
    # ============================================
    gzip_static on;                 # 优先返回 .gz 预压缩文件（构建产物）
    gzip on;                        # .gz 文件不存在时回退到运行时压缩
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ============================================
    # 静态资源缓存：前端构建产物通常带 hash，可长期缓存
    # ============================================
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;                 # 缓存 1 年
        add_header Cache-Control "public, immutable";
        access_log off;             # 静态资源不记录访问日志，减少 I/O
    }

    # ============================================
    # API 反向代理：将 /api 请求转发到 Nest 服务
    # ============================================
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 代理缓冲：避免慢客户端阻塞后端
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # ============================================
    # WebSocket 代理：支持 Socket.IO 实时通信
    # ============================================
    location /socket.io {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接超时设置（默认 60s 太短）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ============================================
    # Swagger 文档代理
    # ============================================
    location /swagger {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # SPA 前端路由：所有未匹配的路径回退到 index.html
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }
}
