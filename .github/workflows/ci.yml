name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint server
        run: yarn workspace @my-first-nest/server eslint "{src,database,test}/**/*.ts"

      - name: Lint web
        run: yarn workspace @my-first-nest/web lint

      - name: Test server
        run: yarn workspace @my-first-nest/server test

      - name: Test web
        run: yarn workspace @my-first-nest/web test

      - name: Build server
        run: yarn workspace @my-first-nest/server build

      - name: Build web
        run: yarn workspace @my-first-nest/web build

      - name: Build docs
        run: yarn workspace @my-first-nest/docs build
