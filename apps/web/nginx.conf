server {
    listen 80;
    server_name localhost;

    # ============================================
    # Gzip 压缩：优先使用构建时预压缩的 .gz 文件
    # ============================================
    gzip_static on;                 # 优先返回 .gz 预压缩文件（构建产物）
    gzip on;                        # .gz 文件不存在时回退到运行时压缩
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ============================================
    # 静态资源缓存
    # ============================================
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================
    # SPA 前端路由
    # ============================================
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
